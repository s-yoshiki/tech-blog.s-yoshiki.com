name: reviewdog

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  reviewdog-github-check:
    name: reviewdog (github-check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24.x"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Execute textlint for ブログ記事
        # コンテンツが多すぎると exit code 1となる
        run: |
          pnpm exec textlint --rule no-mix-dearu-desumasu --rule max-ten --rule spellcheck-tech-word ./content 2>&1 | tee ./.textlint.log

      - name: Run reviewdog
        # textlintで文章上のミスがあった場合のみ、reviewdogを実行させるようにする
        if: failure()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat .textlint.log | reviewdog -f=checkstyle -name="textlint" -reporter="github-pr-review"
